name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point first, not just the solution.
      placeholder: As a self-hoster, I want ... so that ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like to happen. Sketches, API shapes, or links welcome.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps Enveloo's security-first posture (no new unsanitized trust boundaries)
          required: false
